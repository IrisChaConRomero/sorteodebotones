<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elige tu destino</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
</head>
<body>
    <div class="ocean-background">
        <div class="wave wave3"></div>
        <div class="ship ship3">⛵</div>
        <div class="wave wave2"></div>
        <div class="ship ship1">🏴‍☠️</div>
        <div class="wave wave1"></div>
        <div class="ship ship2">🏴‍☠️</div>
    </div>
    <div class="game-container">
        <h1>Elige tu destino</h1>
        
        <div id="choice-container" class="button-group">
            <button id="btn-red" class="choice-btn red">Rojo</button>
            <button id="btn-blue" class="choice-btn blue">Azul</button>
        </div>

        <div id="result-container" class="hidden">
            <h2 id="result-message"></h2>
            <button id="btn-restart" class="restart-btn">Volver a jugar</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
